  <script src="/_sdk/719055fef2a85d14.editing_sdk.js" integrity="sha512-kFqrdGgIiTOsu307feB5Cy3JVP9IayftsmCIZ0csxYBGuBmJQPhyvcnmKR8F0fTW97h5s1gAvz3SumI8zJ6OxQ=="></script>
  <script>
document.addEventListener('DOMContentLoaded', () => {
  lucide.createIcons();

  const PAGE_COUNT = 5;
  const track = document.getElementById('track');
  const stage = document.getElementById('stage');
  const zoomLayer = document.getElementById('zoomLayer');
  const canvases = Array.from(document.querySelectorAll('.draw-canvas'));
  const pageIndicator = document.getElementById('page-indicator');
  const saveStatus = document.getElementById('save-status');

  // Tool state
  const tool = { color:'#2b2b2b', size:4, opacity:1, style:'pen' };
  let current = 0;
  let zoom = 1;
  let touchDistance = 0;

  // Per-page stroke stacks: each stroke = {style,color,size,opacity,points:[{x,y,t}]}
  const strokes = Array.from({length:PAGE_COUNT}, () => []);
  const redoStacks = Array.from({length:PAGE_COUNT}, () => []);

  // Backend rows keyed by page_index for update-in-place
  const rows = {}; // page_index -> record
  let sdkReady = false;

  // ---- Canvas setup (hi-res backing store) ----
  const ctxs = [];
  function sizeCanvas(cv){
    const rect = cv.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 3);
    const w = Math.max(1, Math.round(rect.width * dpr));
    const h = Math.max(1, Math.round(rect.height * dpr));
    if (cv.width !== w || cv.height !== h){
      cv.width = w; cv.height = h;
    }
    const ctx = cv.getContext('2d');
    ctx.setTransform(1,0,0,1,0,0);
    ctxs[+cv.dataset.index] = ctx;
  }
  function resizeAll(){
    canvases.forEach(cv => { sizeCanvas(cv); redraw(+cv.dataset.index); });
  }

  // ---- Rendering ----
  function applyStyle(ctx, s, scale){
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    ctx.globalAlpha = s.opacity;
    ctx.strokeStyle = s.color;
    ctx.fillStyle = s.color;
    ctx.globalCompositeOperation = 'source-over';
    if (s.style === 'marker'){ ctx.globalAlpha = s.opacity * 0.45; ctx.lineWidth = s.size*2.2*scale; }
    else if (s.style === 'pencil'){ ctx.globalAlpha = s.opacity * 0.85; ctx.lineWidth = Math.max(0.5,s.size*0.5)*scale; }
    else if (s.style === 'pen'){ ctx.lineWidth = Math.max(0.8,s.size*0.6)*scale; }
    else { ctx.lineWidth = s.size*scale; }
  }

  function drawStroke(ctx, s, scale){
    const pts = s.points;
    if (!pts.length) return;
    applyStyle(ctx, s, scale);

    if (s.style === 'pencil'){
      // textured jitter dots along path for a pencil grain
      ctx.beginPath();
      for (let i=1;i<pts.length;i++){
        const a=pts[i-1], b=pts[i];
        const steps = Math.max(1, Math.hypot(b.x-a.x,b.y-a.y));
        for (let j=0;j<steps;j++){
          const t=j/steps;
          const x=(a.x+(b.x-a.x)*t)*scale + (Math.random()-.5)*s.size*0.6*scale;
          const y=(a.y+(b.y-a.y)*t)*scale + (Math.random()-.5)*s.size*0.6*scale;
          ctx.moveTo(x,y); ctx.lineTo(x+0.6,y+0.6);
        }
      }
      ctx.stroke();
      return;
    }

    if (s.style === 'brush' || s.style === 'calligraphy'){
      // variable width per segment
      for (let i=1;i<pts.length;i++){
        const a=pts[i-1], b=pts[i];
        let w;
        if (s.style === 'brush'){
          const dt = Math.max(1,(b.t-a.t));
          const speed = Math.hypot(b.x-a.x,b.y-a.y)/dt;
          w = Math.max(1, s.size*(1.6 - Math.min(1,speed*0.12)))*scale;
        } else {
          const ang = Math.atan2(b.y-a.y,b.x-a.x);
          w = Math.max(1, s.size*(0.35 + Math.abs(Math.cos(ang - Math.PI/4))*1.3))*scale;
        }
        ctx.lineWidth = w;
        ctx.beginPath();
        ctx.moveTo(a.x*scale,a.y*scale);
        ctx.lineTo(b.x*scale,b.y*scale);
        ctx.stroke();
      }
      return;
    }

    // pen / marker : smooth polyline
    ctx.beginPath();
    ctx.moveTo(pts[0].x*scale, pts[0].y*scale);
    for (let i=1;i<pts.length;i++){
      const a=pts[i-1], b=pts[i];
      const mx=(a.x+b.x)/2*scale, my=(a.y+b.y)/2*scale;
      ctx.quadraticCurveTo(a.x*scale,a.y*scale,mx,my);
    }
    const last=pts[pts.length-1];
    ctx.lineTo(last.x*scale,last.y*scale);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  function redraw(idx){
    const cv = canvases[idx];
    const ctx = ctxs[idx];
    if (!ctx) return;
    // scale from CSS px -> backing px
    const scale = cv.width / cv.getBoundingClientRect().width;
    ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0,0,cv.width,cv.height);
    strokes[idx].forEach(s => drawStroke(ctx, s, scale));
    ctx.globalAlpha = 1;
  }

  // ---- Drawing input ----
  let drawing = false, activeStroke = null, activeIdx = -1;

  function canvasPoint(cv, e){
    const r = cv.getBoundingClientRect();
    return { x:(e.clientX - r.left), y:(e.clientY - r.top), t:performance.now() };
  }

  canvases.forEach(cv => {
    const idx = +cv.dataset.index;
    cv.addEventListener('pointerdown', (e) => {
      if (idx !== current) return;
      e.preventDefault();
      cv.setPointerCapture(e.pointerId);
      drawing = true; activeIdx = idx;
      redoStacks[idx] = [];
      activeStroke = { style:tool.style, color:tool.color, size:tool.size, opacity:tool.opacity, points:[canvasPoint(cv,e)] };
      strokes[idx].push(activeStroke);
    });
    cv.addEventListener('pointermove', (e) => {
      if (!drawing || activeIdx !== idx) return;
      e.preventDefault();
      // coalesced events for smoothness
      const events = e.getCoalescedEvents ? e.getCoalescedEvents() : [e];
      events.forEach(ev => activeStroke.points.push(canvasPoint(cv,ev)));
      redraw(idx);
    });
    const end = (e) => {
      if (!drawing || activeIdx !== idx) return;
      drawing = false;
      redraw(idx);
      scheduleSave(idx);
      activeStroke = null; activeIdx = -1;
    };
    cv.addEventListener('pointerup', end);
    cv.addEventListener('pointercancel', end);
    cv.addEventListener('pointerleave', (e) => { if(drawing && activeIdx===idx) end(e); });
  });

  // ---- Navigation ----
  function goTo(i){
    current = Math.max(0, Math.min(PAGE_COUNT-1, i));
    track.style.transform = `translateX(${-current*100}%)`;
    pageIndicator.textContent = `${current+1} / ${PAGE_COUNT}`;
  }
  document.getElementById('btn-prev').addEventListener('click', () => goTo(current-1));
  document.getElementById('btn-next').addEventListener('click', () => goTo(current+1));

  // Swipe on the stage background (not while drawing)
  let swipeStart=null;
  stage.addEventListener('pointerdown', (e) => {
    if (e.target.classList.contains('draw-canvas')) return;
    swipeStart = { x:e.clientX, y:e.clientY };
  });
  stage.addEventListener('pointerup', (e) => {
    if (!swipeStart) return;
    const dx = e.clientX - swipeStart.x;
    if (Math.abs(dx) > 60){ dx < 0 ? goTo(current+1) : goTo(current-1); }
    swipeStart = null;
  });

  // ---- Pinch zoom for touch devices ----
  stage.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2){
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchDistance = Math.sqrt(dx*dx + dy*dy);
    }
  });
  stage.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2){
      e.preventDefault();
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const newDistance = Math.sqrt(dx*dx + dy*dy);
      const scale = newDistance / (touchDistance || newDistance);
      zoom = Math.max(0.6, Math.min(3, zoom * scale));
      applyZoom();
      touchDistance = newDistance;
    }
  });

  // ---- Zoom / fullscreen ----
  function applyZoom(){ zoomLayer.style.transform = `scale(${zoom})`; }
  document.getElementById('btn-zoomin').addEventListener('click', ()=>{ zoom=Math.min(3,zoom+0.2); applyZoom(); });
  document.getElementById('btn-zoomout').addEventListener('click', ()=>{ zoom=Math.max(0.6,zoom-0.2); applyZoom(); });
  document.getElementById('btn-fullscreen').addEventListener('click', ()=>{
    if (!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); }
    else { document.exitFullscreen?.(); }
  });

  // ---- Undo / redo / clear ----
  document.getElementById('btn-undo').addEventListener('click', ()=>{
    if (strokes[current].length){ redoStacks[current].push(strokes[current].pop()); redraw(current); scheduleSave(current); }
  });
  document.getElementById('btn-redo').addEventListener('click', ()=>{
    if (redoStacks[current].length){ strokes[current].push(redoStacks[current].pop()); redraw(current); scheduleSave(current); }
  });
  document.getElementById('btn-clear').addEventListener('click', ()=>{
    if (strokes[current].length){ redoStacks[current]=[]; strokes[current]=[]; redraw(current); scheduleSave(current); }
  });

  // ---- Print (current page) ----
  document.getElementById('btn-print').addEventListener('click', ()=>{
    document.querySelectorAll('.page').forEach((p,i)=> p.classList.toggle('print-active', i===current));
    window.print();
  });

  // ---- Tool bindings ----
  document.getElementById('color-input').addEventListener('input', e => tool.color = e.target.value);
  document.getElementById('thickness-input').addEventListener('input', e => tool.size = +e.target.value);
  document.getElementById('opacity-input').addEventListener('input', e => tool.opacity = +e.target.value/100);
  document.querySelectorAll('.style-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.style-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      tool.style = btn.dataset.style;
    });
  });

  // Theme toggle
  document.getElementById('btn-theme').addEventListener('click', ()=>{
    document.body.classList.toggle('theme-dark');
    localStorage.setItem('calli-theme', document.body.classList.contains('theme-dark') ? 'dark':'light');
  });
  if (localStorage.getItem('calli-theme') === 'dark') document.body.classList.add('theme-dark');

  window.addEventListener('resize', resizeAll);

  // ============ Data SDK persistence ============
  const saveTimers = {};
  function setStatus(txt){ saveStatus.textContent = txt; }

  function scheduleSave(idx){
    setStatus('Se salvează…');
    clearTimeout(saveTimers[idx]);
    saveTimers[idx] = setTimeout(()=>savePage(idx), 700);
  }

  async function savePage(idx){
    if (!sdkReady) { setStatus(''); return; }
    const payload = {
      page_index: idx,
      drawing_data: JSON.stringify(strokes[idx]),
      updated_at: new Date().toISOString()
    };
    try {
      let result;
      if (rows[idx]){
        result = await window.dataSdk.update({ ...rows[idx], ...payload });
      } else {
        result = await window.dataSdk.create(payload);
      }
      setStatus(result.isOk ? 'Salvat ✓' : 'Eroare la salvare');
    } catch(_) {
      setStatus('Eroare la salvare');
    }
  }

  const handler = {
    onDataChanged(data){
      data.forEach(rec => {
        const idx = Number(rec.page_index);
        if (idx < 0 || idx >= PAGE_COUNT) return;
        rows[idx] = rec;
        // Only load if we don't have unsaved local content for that page
        if (strokes[idx].length === 0 && rec.drawing_data){
          try {
            const parsed = JSON.parse(rec.drawing_data);
            if (Array.isArray(parsed)){ strokes[idx] = parsed; redraw(idx); }
          } catch(_){}
        }
      });
    }
  };

  // Initialise after canvases sized (wait a frame so images/layout settle)
  requestAnimationFrame(async () => {
    resizeAll();
    goTo(0);
    try {
      const res = await window.dataSdk.init(handler);
      sdkReady = res.isOk;
    } catch(_){ sdkReady = false; }
  });

  // Re-size once images load (dimensions may change)
  window.addEventListener('load', () => setTimeout(resizeAll, 200));
